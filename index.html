<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Github Issues Tracker | Login</title>
    <!-- favicon -->
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- tailwind+daisyUI CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      /* google font apply */
      * {
        font-family: "Geist", sans-serif;
      }
    </style>

    
  </head>
  <body>
    <!-- login form -->

    <section class="h-screen grid place-items-center py-20">
      <div class="card bg-base-100 w-[90%] max-w-md shadow">
        <div class="py-5 text-center mt-2">
          <img
            src="./assets/github-logo.png"
            alt="github logo"
            class="mx-auto w-[100px] h-[100px]"
          />
          <div class="mt-6">
            <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
          </div>
        </div>
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label">Username</label>
            <input
              type="text"
              class="input w-full"
              placeholder="Enter Username"
              id="user-name-input"
            />
            <label class="label">Password</label>
            <input
              type="password"
              class="input w-full"
              placeholder="Enter Password"
              id="user-login-pass"
            />
            <button class="btn btn-primary mt-4" id="sign-in-btn">
              Sign In
            </button>
          </fieldset>
        </div>
      </div>
    </section>

    <script src="./scripts/reusable.js"></script>
    <script src="./scripts/login.js"></script>
  </body>
</html>
