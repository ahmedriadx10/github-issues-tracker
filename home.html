<!doctype html>
<html lang="en" class="bg-[#f7fafc]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Github Issues Tracker | Home</title>
    <!-- favicon -->
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- tailwind+daisyUI CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      /* google font apply */
      * {
        font-family: "Geist", sans-serif;
      }

      .purple{
        color: #A855F7;
      }
    </style>
  </head>
  <body>
    <!-- navbar -->
    <nav>
      <div class="navbar flex-col gap-5 sm:flex-row bg-base-100 shadow-sm">
        <div class="flex-1">
          <div class="flex font-semibold gap-2 items-center">
            <img src="./assets/github-logo.png" class="w-9 h-9" alt="" />
            <h2 class="text-2xl">Github Issues Tracker</h2>
          </div>
        </div>
        <div class="flex gap-2">
          <label class="input w-32 md:w-auto">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input
              type="search"
              required
              placeholder="Search Issues"
              class="placeholder:text-[10px] md:placeholder:text-[14px]"
              id="user-search-input"
            />
          </label>
          <div class="dropdown dropdown-end">
            <button class="btn btn-primary" id="search-issues-btn">
              Search Issues
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- tab section -->
    <section class="mt-[60px] max-w-6xl mx-auto w-[90%]">
      <!-- tab buttons container -->

      <div
        class="flex gap-2 p-6 shadow-sm bg-base-100 rounded-lg"
        id="tab-buttons-container"
      >
        <button class="tab-button btn btn-primary w-auto sm:w-28">All</button>
        <button class="tab-button btn w-auto sm:w-28">Open</button>
        <button class="tab-button btn w-auto sm:w-28">Closed</button>
      </div>
    </section>

    <!-- issues section -->
    <section class="mt-4 max-w-6xl w-[90%] mx-auto shadow-sm bg-[#fafafa] rounded-b-lg">
      <!-- issues tab area -->
      <div
        class="flex justify-between items-center p-6 bg-base-100 shadow-sm rounded-t-lg"
      >
        <!-- issues count and logo -->
        <div class="flex gap-2 items-center">
          <div class="bg-primary-content p-3 rounded-full">
            <img src="./assets/Aperture.png" alt="" />
          </div>
          <div>
            <h4 class="font-semibold text-xl">
              <span id="issues-count">0</span> Issues
            </h4>
            <p class="text-[#64748B]">Track and manage your project issues</p>
          </div>
        </div>

        <!-- status area -->
        <div class="flex gap-4 font-medium">
          <p><i class="text-[12px] fa-solid fa-circle text-success"></i> Open</p>
          <p><i class="text-[12px] fa-solid fa-circle purple"></i> Closed</p>
        </div>
      </div>


<!-- issues content area -->

<section class="">
<!-- loading spinner -->
<section class="hidden" id="loading-spinner">
  <div class="p-10 grid place-items-center" id="spinner-container"><span class="w-10 loading loading-spinner text-primary"></span></>
</section>





<!-- issues cards area -->

<section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="issues-card-container"></section>

</section>


    </section>

    <script src="./scripts/reusable.js"></script>
    <script src="./scripts/home.js"></script>
  </body>
</html>
